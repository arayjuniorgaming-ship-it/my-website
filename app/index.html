<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>app chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="aabababab.jpg">
</head>
<body>
    <div class="container">
        <div id="login-screen"  class="screen active">
            <div class="logo">
                <img src="aabababab.jpg" alt="appchat" class="logo-img">
                <h1>appchat</h1>
                <p>aplikasi chat untuk semua dan offline</p>
            </div>
            <input type="text" id="username" placeholder="masukkan nama kamu" maxlength="20">
            <button onclick="joinChat()">🚀 Mulai Chat</button>
            <div class="info">
                <small>💡 Buka beberapa tab = multi-user real-time!</small>
            </div>
        </div>
        <div id="chat-screen" class="screen">
            <div class="header">
                <div class="title">
                    <h2>📱 Chat Room</h2>
                    <span id="user-count" class="count">0 online</span>
                </div>
                <div class="user-list" id="users-list"></div>
            </div>

            <div class="messages" id="messages">
                <div class="system-msg">🎉 Selamat datang di ChatApp!<br>👥 Buka tab baru untuk tambah user lain</div>
            </div>
            <div class="filter-note" id="filter-note">🔒 Sensor kata kasar aktif.</div>

            <div class="input-area">
                <button type="button" id="emoji-toggle" class="emoji-toggle">😀</button>
                <input type="text" id="message-input" placeholder="💭 Ketik pesan...">
                <button onclick="sendMessage()">📤 Kirim</button>
                <div class="emoji-picker" id="emoji-picker" hidden>
                    <button type="button" class="emoji-option">😀</button>
                    <button type="button" class="emoji-option">😂</button>
                    <button type="button" class="emoji-option">😍</button>
                    <button type="button" class="emoji-option">😎</button>
                    <button type="button" class="emoji-option">😢</button>
                    <button type="button" class="emoji-option">😡</button>
                    <button type="button" class="emoji-option">👍</button>
                    <button type="button" class="emoji-option">🙏</button>
                    <button type="button" class="emoji-option">🎉</button>
                    <button type="button" class="emoji-option">❤️</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
